# Anexo 18: Archivo contacts.cfg para configuración de contactos en Nagios
###############################################################################
# CONTACTS.CFG - SAMPLE CONTACT/CONTACTGROUP DEFINITIONS
###############################################################################

# Just one contact defined by default - the Nagios admin
define contact {
    contact_name                    nagiosadmin
    alias                           Nagios Admin
    email                           iset.smt2024@gmail.com
    service_notification_period     24x7
    host_notification_period        24x7
    service_notification_options    w,u,c,r
    host_notification_options       d,u,r
    service_notification_commands   notify-service-by-email
    host_notification_commands      notify-host-by-email
}

###############################################################################
# CONTACT GROUPS
###############################################################################

define contactgroup {
    contactgroup_name               admins
    alias                           Nagios Administrators
    members                         nagiosadmin
}

# Anexo 19: Archivo php.cfg para configuración de servicios en Nagios
###############################################################################
# PHP.CFG - SAMPLE SERVICE DEFINITIONS
###############################################################################

# Definicion del host BD
define host {
    use                     linux-server
    host_name               BD
    alias                   BD
    address                 192.168.1.114
    contact_groups          admins
}

# Servicio de PING
define service {
    use                     generic-service
    host_name               BD
    service_description     PING
    check_command           check_ping!100.0,20%!500.0,60%
}

# Servicio de Iluminacion
define service {
    use                     generic-service
    host_name               BD
    service_description     Iluminacion
    check_command           check_nrpe_1arg!check_ilum
}

# Servicios de Temperatura (Sensor 1 - Sensor 16)
# (Se repite la estructura para cada sensor del 1 al 16)
define service {
    use                     generic-service
    host_name               BD
    service_description     Temperatura Sensor 1
    check_command           check_nrpe!check_tem_S1
    contact_groups          admins
    notifications_enabled   1
    max_check_attempts      1
    notification_options    w,u,c,r
}

# ... [Estructuras intermedias S2 a S15 omitidas por brevedad en este ejemplo, pero siguen el mismo formato]

define service {
    use                     generic-service
    host_name               BD
    service_description     Temperatura Sensor 16
    check_command           check_nrpe!check_tem_S16
    contact_groups          admins
    notifications_enabled   1
    max_check_attempts      1
    notification_options    w,u,c,r
}

# Servicios de Humedad (Sensor 1 - Sensor 16)
define service {
    use                     generic-service
    host_name               BD
    service_description     Humedad Sensor 1
    check_command           check_nrpe!check_hum_S1
    contact_groups          admins
    notifications_enabled   1
    max_check_attempts      2
    notification_options    w,u,c,r
}

# ... [Estructuras intermedias S2 a S15]

define service {
    use                     generic-service
    host_name               BD
    service_description     Humedad Sensor 16
    check_command           check_nrpe!check_hum_S16
    contact_groups          admins
    notifications_enabled   1
    max_check_attempts      2
    notification_options    w,u,c,r
}

# Anexo 20: Archivo commands.cfg para definiciones de comandos en Nagios
###############################################################################
# COMMANDS.CFG - SAMPLE COMMAND DEFINITIONS FOR NAGIOS 4.4.14
###############################################################################

define command {
    command_name    check_nrpe_1arg
    command_line    /usr/local/nagios/libexec/check_nrpe -H $HOSTADDRESS$ -c $ARG1$
}

define command {
    command_name    check_nrpe
    command_line    /usr/local/nagios/libexec/check_nrpe -H $HOSTADDRESS$ -c $ARG1$
}

define command {
    command_name    notify-host-by-email
    command_line    /usr/bin/printf "%b" "***** Nagios *****\n\nNotification Type: $NOTIFICATIONTYPE$\n\nHost: $HOSTNAME$\nState: $HOSTSTATE$\nAddress: $HOSTADDRESS$\n\n$HOSTOUTPUT$\n" | /usr/bin/mail -s "$NOTIFICATIONTYPE$ Host $HOSTNAME$ is $HOSTSTATE$" $CONTACTEMAIL$
}

define command {
    command_name    notify-service-by-email
    command_line    /usr/bin/printf "%b" "***** Nagios *****\n\nNotification Type: $NOTIFICATIONTYPE$\n\nService: $SERVICEDESC$\nHost: $HOSTNAME$\nState: $SERVICESTATE$\nAddress: $HOSTADDRESS$\n\n$SERVICEOUTPUT$\n" | /usr/bin/mail -s "$NOTIFICATIONTYPE$ Service $SERVICEDESC$ on host $HOSTNAME$ is $SERVICESTATE$" $CONTACTEMAIL$
}
# Anexo: 21 Archivo nrpe.cfg para configuración de NRPE en Nagios
###############################################################################
# NRPE.CFG - CONFIGURACION DEL DAEMON NRPE PARA NAGIOS
#
# NOTAS: Este archivo de configuracion proporciona opciones para personalizar
#        el comportamiento del daemon NRPE. Incluye configuraciones como el 
#        puerto de escucha, las direcciones IP permitidas y los comandos NRPE.
#
###############################################################################

# ARCHIVO PID
# El nombre del archivo en el que el daemon NRPE debe escribir su ID de proceso
pid_file=/usr/local/nagios/var/nrpe.pid

# NUMERO DE PUERTO
# El numero de puerto en el que el daemon NRPE escuchara las conexiones.
server_port=5666

# DIRECCIONES IP PERMITIDAS
# Lista separada por comas de direcciones IP que tienen permiso para comunicarse.
allowed_hosts=127.0.0.1,192.168.1.120

# TIEMPO DE EJECUCION DEL COMANDO
# Segundos que el daemon permitira que los plugins se ejecuten antes de matarlos.
command_timeout=60

# TIEMPO DE CONEXION
# Segundos que el daemon esperara para establecer una conexion.
connection_timeout=300

# COMANDOS DEFINIDOS PARA NRPE (ESTANDAR)
command[check_users]=/usr/local/nagios/libexec/check_users -w 5 -c 10
command[check_load]=/usr/local/nagios/libexec/check_load -r -w .15,.10,.05 -c .30,.25,.20
command[check_hda1]=/usr/local/nagios/libexec/check_disk -w 20% -c 10% -p /dev/hda1
command[check_zombie_procs]=/usr/local/nagios/libexec/check_procs -w 5 -c 10 -s Z
command[check_total_procs]=/usr/local/nagios/libexec/check_procs -w 150 -c 200

# Comandos de Iluminacion
command[check_ilum]=/usr/local/nagios/libexec/check_iluminacion

# Comandos de Temperatura (Sensor 1 a Sensor 16)
command[check_tem_S1]=/usr/local/nagios/libexec/check_temperatura 1
command[check_tem_S2]=/usr/local/nagios/libexec/check_temperatura 2
command[check_tem_S3]=/usr/local/nagios/libexec/check_temperatura 3
command[check_tem_S4]=/usr/local/nagios/libexec/check_temperatura 4
command[check_tem_S5]=/usr/local/nagios/libexec/check_temperatura 5
command[check_tem_S6]=/usr/local/nagios/libexec/check_temperatura 6
command[check_tem_S7]=/usr/local/nagios/libexec/check_temperatura 7
command[check_tem_S8]=/usr/local/nagios/libexec/check_temperatura 8
command[check_tem_S9]=/usr/local/nagios/libexec/check_temperatura 9
command[check_tem_S10]=/usr/local/nagios/libexec/check_temperatura 10
command[check_tem_S11]=/usr/local/nagios/libexec/check_temperatura 11
command[check_tem_S12]=/usr/local/nagios/libexec/check_temperatura 12
command[check_tem_S13]=/usr/local/nagios/libexec/check_temperatura 13
command[check_tem_S14]=/usr/local/nagios/libexec/check_temperatura 14
command[check_tem_S15]=/usr/local/nagios/libexec/check_temperatura 15
command[check_tem_S16]=/usr/local/nagios/libexec/check_temperatura 16

# Comandos de Humedad (Sensor 1 a Sensor 16)
command[check_hum_S1]=/usr/local/nagios/libexec/check_humedad 1
command[check_hum_S2]=/usr/local/nagios/libexec/check_humedad 2
